<!DOCTYPE html>
<html>
<head>
    <title>ETS Ceylon FM - ගේම් රේඩියෝ</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
        }
        .player-box {
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .sub {
            color: #ffd700;
            margin-bottom: 30px;
        }
        iframe {
            width: 100%;
            height: 60px;
            border: none;
            border-radius: 10px;
            background: #2c2c3e;
        }
        .direct-link {
            margin-top: 20px;
            padding: 15px;
            background: #2c2c3e;
            border-radius: 10px;
            word-break: break-all;
        }
        .direct-link a {
            color: #ffd700;
            text-decoration: none;
        }
        .status {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
        }
        button {
            background: #ff4757;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            margin: 5px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="player-box">
        <h1>🎧 ETS CEYLON FM</h1>
        <div class="sub">🇱🇰 ලංකාවේ ගේම් රේඩියෝ එක</div>
        
        <!-- Method 1: Iframe player (RadioJS) -->
        <iframe src="https://radiojs.com/embed?url=http://176.227.215.27:5539/stream"></iframe>
        
        <div style="margin: 15px 0; color: #888;">--------- හෝ ---------</div>
        
        <!-- Method 2: Direct Stream Link -->
        <div class="direct-link">
            🎵 <strong>කෙලින්ම සවන් දෙන්න:</strong><br>
            <a href="http://176.227.215.27:5539/stream" target="_blank">http://176.227.215.27:5539/stream</a><br>
            <small>(Click කළාම browser එකෙන් විවෘත වෙයි)</small>
        </div>
        
        <div class="status">
            📻 ETS Ceylon FM | 🔴 24/7 ඔන්ලයින්
        </div>
    </div>
</body>
</html>
