<!DOCTYPE html>
<html>
<head>
    <title>ETS Ceylon FM - ගේම් රේඩියෝ</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
        }
        .player-box {
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .sub {
            color: #ffd700;
            margin-bottom: 30px;
        }
        audio {
            width: 100%;
            margin: 20px 0;
            border-radius: 10px;
        }
        .status {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
        }
        button {
            background: #ff4757;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            margin: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #e84118;
        }
        .error {
            color: #ff6b6b;
            margin-top: 15px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="player-box">
        <h1>🎧 ETS CEYLON FM</h1>
        <div class="sub">🇱🇰 ලංකාවේ ගේම් රේඩියෝ එක</div>
        
        <audio id="radioPlayer" controls>
            <source src="https://cors-anywhere.herokuapp.com/http://176.227.215.27:5539/stream" type="audio/mpeg">
        </audio>
        
        <div>
            <button onclick="document.getElementById('radioPlayer').play()">▶ Play</button>
            <button onclick="document.getElementById('radioPlayer').pause()">⏸ Pause</button>
            <button onclick="document.getElementById('radioPlayer').load()">🔄 Reload</button>
        </div>
        
        <div class="status">
            📻 ETS Ceylon FM | 🔴 ඔන්ලයින්
        </div>
        <div class="error" id="errorMsg"></div>
    </div>

    <script>
        const audio = document.getElementById('radioPlayer');
        
        audio.onerror = function() {
            document.getElementById('errorMsg').innerHTML = '❌ Stream එක connect වෙන්නේ නැහැ. <br> කරුණාකර පරීක්ෂා කරන්න: <br> 1. Stream link එක browser එකෙන් වැඩද? <br> 2. Reload බටනය ඔබන්න';
        };
        
        audio.onplaying = function() {
            document.getElementById('errorMsg').innerHTML = '✅ හරි! දැන් ගුවන් විදුලිය වැඩ කරනවා';
        };
    </script>
</body>
</html>
